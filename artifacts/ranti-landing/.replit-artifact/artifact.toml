kind = "web"
previewPath = "/"
title = "Ranti — Landing Page"
version = "1.0.0"
id = "artifacts/ranti-landing"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20724

[services.development]
run = "pnpm --filter @workspace/ranti-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ranti-landing", "run", "build" ]
serve = "static"
publicDir = "artifacts/ranti-landing/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20724"
BASE_PATH = "/"
